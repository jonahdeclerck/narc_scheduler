<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narc Scheduler</title>
    <link rel="icon" href="./img/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Integral CF';
            src: url('./fonts/Integral CF Regular.woff2') format('woff2');
            font-weight: normal;
        }

        :root {
            --narc-bg: #0a0a0a;
            --narc-card: #1c1c1e;
            --narc-text: #ffffff;
            --narc-subtext: #a1a1a6;
            --accent: #00c8ff; 
            --special: #b300ff; 
            --success: #2ecc71;
            --alt-color: #ffd98d;
            --danger: #ff3b30;
            --share: #25d366;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--narc-bg); color: var(--narc-text);
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .main-wrapper { display: flex; flex-direction: column; gap: 30px; width: 100%; max-width: 1200px; }

        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; }
            .editor-side { flex: 1.2; }
            .preview-side { flex: 0.8; position: sticky; top: 20px; }
        }

        .container {
            background: var(--narc-card); border-radius: 24px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid #2c2c2e; margin-bottom: 20px;
        }

        .section-label { 
            font-size: 10px; font-weight: 500; color: var(--narc-subtext); 
            margin: 0 0 12px 5px; text-transform: uppercase; letter-spacing: 1.5px;
        }

        .entry-card {
            background: #2c2c2e; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; position: relative; border: 1px solid #3a3a3c;
        }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .full-width { grid-column: span 2; }

        input[type="text"], input[type="date"], input[type="time"] {
            border: 1px solid #3a3a3c; border-radius: 8px; padding: 10px;
            font-size: 13px; background: #1c1c1e; color: white; outline: none; 
            width: calc(100% - 22px); font-weight: 300;
        }

        .remove-entry-btn {
            position: absolute; top: -10px; right: -10px;
            background: var(--danger); color: white; border: none;
            border-radius: 50%; width: 24px; height: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 5;
            font-weight: bold; font-size: 14px;
        }

        button.main-btn {
            padding: 14px; border-radius: 12px; border: none; 
            font-family: 'Integral CF', sans-serif; cursor: pointer; 
            width: 100%; text-transform: uppercase; font-size: 13px;
        }
        
        .weekly-btn { background: var(--accent); color: white; margin-bottom: 10px; }
        .special-btn { background: var(--special); color: white; }
        .share-btn { background: var(--share); color: white; margin-top: 10px; }
        #gen-btn { background: #fff; color: #000; margin-top: 15px; font-weight: 700; }
        
        .download-btn { 
            margin-top: 20px; background: var(--success); color: white; 
            text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 12px;
            font-family: 'Integral CF', sans-serif; cursor: pointer;
        }

        .import-wrap { margin-bottom: 20px; border: 1px dashed #3a3a3c; padding: 15px; border-radius: 12px; text-align: center; }

        canvas { display: none; }
        
        .preview-box {
            width: 100%; aspect-ratio: 1080/1350; border-radius: 12px; 
            border: 1px solid #3a3a3c; position: relative; overflow: hidden;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        #preview-placeholder { color: #444; font-family: 'Integral CF'; font-size: 14px; letter-spacing: 2px; }
        #preview { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        
        .smart-header-info {
            background: rgba(0, 200, 255, 0.05); border: 1px solid rgba(0, 200, 255, 0.3);
            padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 12px;
            color: var(--accent); font-weight: 400; text-align: center; font-family: 'Integral CF', sans-serif;
        }

        .alt-check-wrap { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 12px; color: var(--narc-subtext); }
        .alt-check-wrap input:checked + span { color: var(--alt-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="editor-side">
            <div class="container">
                <div style="text-align: center; margin-bottom: 25px;">
                    <img src="./img/logo.png" style="height: 40px;" onerror="this.style.display='none'">
                </div>

                <div id="smart-header-display" class="smart-header-info">ADD RUNS</div>
                <div class="section-label">Footer Tagline</div>
                <input type="text" id="footer-in" class="full-width" value="ALL PACES WELCOME | DISTANCES FLEXIBLE | POST RUN DRINKS">
                
                <div style="margin-top: 20px;">
                    <button id="add-weekly" class="main-btn weekly-btn">+ Weekly Run</button>
                    <button id="add-special" class="main-btn special-btn">+ Special Run</button>
                </div>
                
                <div class="import-wrap" style="margin-top: 20px;">
                    <div class="section-label">Load Existing Schedule</div>
                    <input type="file" id="import-file" accept=".narc,.json" style="font-size: 11px;">
                </div>

            </div>
            <div class="container" id="entries">
                <div class="section-label">Run Schedule Items</div>
            </div>
        </div>

        <div class="preview-side">
            <div class="container">
                <div class="section-label">Preview</div>
                <div class="preview-box">
                    <span id="preview-placeholder">HIT UPDATE TO GENERATE</span>
                    <img id="preview">
                </div>
                <a id="download-link" class="download-btn" style="display:none;" download="NARC_Schedule.png">Download PNG</a>
            </div>
            <canvas id="canvas" width="1080" height="1350"></canvas>

                <button id="gen-btn" class="main-btn">Update Preview</button>
                <button id="share-schedule" class="main-btn share-btn">Export</button>
        </div>
    </div>

    <script>
        const entriesDiv = document.getElementById('entries');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const smartHeaderDisplay = document.getElementById('smart-header-display');
        const mainLogo = new Image(); mainLogo.src = "./img/logo.png";
        const bgImg = new Image(); bgImg.src = "./img/bg.jpg";

        function getHeaderData(dates) {
            if (dates.length === 0) return { range: "ADD RUNS", year: "2026" };
            const firstDate = new Date(dates[0]);
            const day = firstDate.getDay();
            const diff = firstDate.getDate() - day + (day === 0 ? -6 : 1); 
            const monday = new Date(new Date(firstDate).setDate(diff));
            const sunday = new Date(new Date(monday).setDate(monday.getDate() + 6));
            const month = monday.toLocaleDateString('en-GB', { month: 'long' }).toUpperCase();
            const sunMonth = sunday.toLocaleDateString('en-GB', { month: 'long' }).toUpperCase();
            let range = monday.getMonth() === sunday.getMonth() ? 
                   `${month} ${monday.getDate()} - ${sunday.getDate()}` :
                   `${month} ${monday.getDate()} - ${sunMonth} ${sunday.getDate()}`;
            return { range, year: monday.getFullYear() };
        }

        function createEntry(type, savedData = null) {
            const div = document.createElement('div');
            div.className = 'entry-card';
            div.dataset.logo = savedData?.logo || "";
            
            div.innerHTML = `
                <button class="remove-entry-btn" onclick="this.parentElement.remove(); updateSmartHeader();">×</button>
                <div class="grid-inputs">
                    <input type="date" class="date-in" value="${savedData?.date || new Date().toISOString().split('T')[0]}" onchange="updateSmartHeader()">
                    <input type="time" class="time-in" value="${savedData?.time || (type==='weekly'?'19:00':'18:30')}">
                    <input type="text" class="comm-in full-width" placeholder="TITLE" value="${savedData?.title || (type==='weekly'?'5/10KM EASY RUN':'')}">
                    <input type="text" class="loc-in full-width" placeholder="LOCATION" value="${savedData?.loc || (type==='weekly'?'Kafee VanGogh - Dusartplein Hasselt':'')}">
                    <div class="alt-check-wrap full-width">
                        <label><input type="checkbox" class="is-alt" ${savedData?.isAlt ? 'checked' : ''}> <span>Alternate Color</span></label>
                        <input type="file" class="logo-file" accept="image/*" style="margin-left:15px;">
                    </div>
                </div>`;
            entriesDiv.appendChild(div);
            div.querySelector('.logo-file').onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => div.dataset.logo = ev.target.result;
                    reader.readAsDataURL(file);
                }
            };
            updateSmartHeader();
        }

        function updateSmartHeader() {
            const dates = Array.from(document.querySelectorAll('.date-in')).map(i => i.value).filter(v => v);
            const head = getHeaderData(dates);
            smartHeaderDisplay.innerText = `${head.range}  |  ${head.year}`;
        }

        // --- EXPORT & SHARE LOGIC ---
        document.getElementById('share-schedule').onclick = async () => {
            const cards = Array.from(document.querySelectorAll('.entry-card'));
            const scheduleObj = {
                footer: document.getElementById('footer-in').value,
                runs: cards.map(c => ({
                    date: c.querySelector('.date-in').value,
                    time: c.querySelector('.time-in').value,
                    title: c.querySelector('.comm-in').value,
                    loc: c.querySelector('.loc-in').value,
                    isAlt: c.querySelector('.is-alt').checked,
                    logo: c.dataset.logo || null
                }))
            };

            const blob = new Blob([JSON.stringify(scheduleObj)], { type: 'application/json' });
            const file = new File([blob], `NARC_Schedule_${new Date().toISOString().split('T')[0]}.narc`, { type: 'application/json' });

            if (navigator.share) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'NARC Run Schedule',
                        text: 'Here is the latest run schedule file.'
                    });
                } catch (err) { console.error("Share failed", err); }
            } else {
                // Fallback for desktop: Download
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = file.name;
                a.click();
            }
        };

        // --- IMPORT LOGIC ---
        document.getElementById('import-file').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                document.getElementById('footer-in').value = data.footer || "";
                entriesDiv.innerHTML = '<div class="section-label">Run Schedule Items</div>';
                data.runs.forEach(run => createEntry('custom', run));
            };
            reader.readAsText(file);
        };

        createEntry('weekly');
        document.getElementById('add-weekly').onclick = () => createEntry('weekly');
        document.getElementById('add-special').onclick = () => createEntry('special');

        document.getElementById('gen-btn').onclick = async function() {
            const cards = Array.from(document.querySelectorAll('.entry-card'));
            const data = cards.map(c => ({
                date: new Date(c.querySelector('.date-in').value),
                time: c.querySelector('.time-in').value,
                title: c.querySelector('.comm-in').value.toUpperCase(),
                loc: c.querySelector('.loc-in').value,
                logo: c.dataset.logo,
                isAlt: c.querySelector('.is-alt').checked
            })).sort((a,b) => a.date - b.date);

            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,1080,1350);
            if(bgImg.complete) {
                const s = Math.max(1080/bgImg.width, 1350/bgImg.height);
                ctx.drawImage(bgImg, 540-(bgImg.width*s)/2, 675-(bgImg.height*s)/2, bgImg.width*s, bgImg.height*s);
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,1080,1350);
            }
            if(mainLogo.complete) {
                const h=100, w=(mainLogo.width/mainLogo.height)*h;
                ctx.drawImage(mainLogo, 540-w/2, 50, w, h);
            }

            const head = getHeaderData(Array.from(document.querySelectorAll('.date-in')).map(i => i.value).filter(v => v));
            ctx.fillStyle = 'white'; ctx.font = '28px "Integral CF"'; 
            ctx.textAlign = 'left'; ctx.fillText(head.range, 100, 215);
            ctx.textAlign = 'right'; ctx.fillText(head.year, 980, 215);

            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(100, 245); ctx.lineTo(980, 245); ctx.stroke();

            const yStart = 400; const yStep = 160; 
            for(let i=0; i<data.length; i++) {
                const r = data[i]; const y = yStart + (i * yStep);
                const activeColor = r.isAlt ? '#ffd98d' : 'white';
                ctx.textAlign = 'left'; ctx.fillStyle = activeColor; ctx.font = '64px "Integral CF"';
                ctx.fillText(String(r.date.getDate()).padStart(2,'0'), 100, y);
                ctx.font = 'bold 18px "Integral CF"'; ctx.fillText(r.date.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase(), 210, y - 32);
                ctx.font = 'bold 18px Helvetica'; ctx.fillText(r.time, 210, y);
                const maxW = r.logo ? 500 : 640;
                ctx.font = 'italic 36px "Integral CF"'; ctx.fillText(r.title, 340, y - 18, maxW);
                ctx.fillStyle = r.isAlt ? activeColor : '#aaa';
                ctx.font = '19px Helvetica'; ctx.fillText(r.loc, 340, y);
                if(r.logo) {
                    const img = new Image();
                    await new Promise(res => { img.onload = () => {
                        const h=70, w=h*(img.width/img.height); ctx.drawImage(img, 980-w, y-60, w, h); res();
                    }; img.onerror = res; img.src = r.logo; });
                }
            }
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '20px "Integral CF"'; ctx.textAlign='center';
            ctx.fillText(document.getElementById('footer-in').value, 540, 1315);
            const out = canvas.toDataURL('image/png');
            const p = document.getElementById('preview'); p.src = out; p.style.display = 'block';
            document.getElementById('preview-placeholder').style.display = 'none';
            const dl = document.getElementById('download-link'); dl.href = out; dl.style.display = 'block';
        };
    </script>
</body>
</html>
