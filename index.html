<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./img/favicon.png">
    <title>Narc Scheduler</title>
    <style>
        @font-face {
            font-family: 'Integral CF';
            src: url('./fonts/Integral CF Regular.woff2') format('woff2');
            font-weight: normal;
        }

        :root {
            --narc-bg: #0a0a0a;
            --narc-card: #1c1c1e;
            --narc-text: #ffffff;
            --narc-subtext: #a1a1a6;
            --accent: #00c8ff; 
            --special: #b300ff; 
            --success: #2ecc71;
            --danger: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--narc-bg); color: var(--narc-text);
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .main-wrapper { display: flex; flex-direction: column; gap: 30px; width: 100%; max-width: 1200px; }

        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; align-items: flex-start; }
            .editor-side { flex: 1.2; }
            .preview-side { flex: 0.8; position: sticky; top: 20px; }
        }

        .container {
            background: var(--narc-card); border-radius: 24px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid #2c2c2e; margin-bottom: 20px;
        }

        .section-label { 
            font-size: 10px; font-weight: 500; color: var(--narc-subtext); 
            margin: 0 0 12px 5px; text-transform: uppercase; letter-spacing: 1.5px;
        }

        .entry-card {
            background: #2c2c2e; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; position: relative; border: 1px solid #3a3a3c;
        }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .full-width { grid-column: span 2; }

        input, select {
            border: 1px solid #3a3a3c; border-radius: 8px; padding: 10px;
            font-size: 13px; background: #1c1c1e; color: white; outline: none; 
            width: 100%; font-weight: 300; box-sizing: border-box;
        }

        .ui-blob {
            display: flex; flex-wrap: wrap; gap: 8px; background: #1c1c1e;
            padding: 12px; border-radius: 8px; border: 1px solid #3a3a3c;
            position: relative;
        }
        
        .logo-controls-blob {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: center;
        }

        .dist-chip { font-size: 11px; display: flex; align-items: center; gap: 4px; cursor: pointer; color: #aaa; }
        .dist-chip input[type="checkbox"] { width: auto; margin: 0; }
        .dist-chip input:checked + span { color: var(--narc-text); font-weight: bold; }
        
        .custom-dist-in { width: 70px !important; padding: 4px 8px !important; font-size: 11px !important; background: #2c2c2e !important; }

        .remove-entry-btn {
            position: absolute; top: -10px; right: -10px;
            background: var(--danger); color: white; border: none;
            border-radius: 50%; width: 24px; height: 24px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 5;
            font-weight: bold; font-size: 14px;
        }

        button.main-btn {
            padding: 14px; border-radius: 12px; border: none; 
            font-family: 'Integral CF', sans-serif; cursor: pointer; 
            width: 100%; text-transform: uppercase; font-size: 13px;
        }
        
        .weekly-btn { background: #3a3a3c; color: white; margin-bottom: 10px; }
        .special-btn { background: var(--special); color: white; }
        
        .download-btn { 
            margin-top: 20px; background: var(--success); color: white; 
            text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 12px;
            font-family: 'Integral CF', sans-serif; cursor: pointer;
        }

        canvas { display: none; }
        .preview-box {
            width: 100%; aspect-ratio: 9/16; border-radius: 12px; 
            border: 1px solid #3a3a3c; position: relative; overflow: hidden;
            background: #000;
        }
        #preview { width: 100%; height: 100%; display: none; object-fit: contain; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="editor-side">
            <div class="container">
                <div style="text-align: center; margin-bottom: 25px;">
                    <img src="./img/logo.png" style="height: 40px;" onerror="this.style.display='none'">
                </div>
                <div id="smart-header-display" style="text-align:center; font-family:'Integral CF'; font-size:12px; color:var(--narc-subtext); margin-bottom:15px;">ADD RUNS</div>
                <div class="section-label">Footer Tagline</div>
                <input type="text" id="footer-in" class="full-width" value="ALL PACES WELCOME | DISTANCES FLEXIBLE | POST RUN DRINKS">
                
                <div style="margin-top: 20px;">
                    <button id="add-weekly" class="main-btn weekly-btn">+ Weekly Run</button>
                    <button id="add-special" class="main-btn special-btn">+ Special Run</button>
                </div>
            </div>
            <div class="container" id="entries">
                <div class="section-label">Run Schedule Items</div>
            </div>
        </div>

        <div class="preview-side">
            <div class="container">
                <div class="section-label">Live Preview</div>
                <div class="preview-box">
                    <img id="preview">
                </div>
                <a id="download-link" class="download-btn" style="display:none;" download="NARC_Story_Safe.png">Download PNG</a>
            </div>
            <canvas id="canvas" width="1080" height="1920"></canvas>
        </div>
    </div>

    <script>
        const entriesDiv = document.getElementById('entries');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mainLogo = new Image(); mainLogo.src = "./img/logo.png";
        const bgImg = new Image(); bgImg.src = "./img/bg.jpg";

        const DIST_OPTIONS = ["5", "10", "16", "21", "30", "42"];
        const MAX_ENTRIES = 8;

        const PRESET_LOGOS = [
            { name: "Kafee VanGogh", path: "./img/logos/vangogh.png" },
            { name: "gigi", path: "./img/logos/gigi.png" },
            { name: "sun run club", path: "./img/logos/src.png" },
        ];

        // --- SAFE MARGIN CONFIGURATION ---
        const PADDING_TOP = 250;
        const PADDING_BOTTOM = 250;
        const PADDING_SIDE = 60;
        const CONTENT_WIDTH = 1080 - (PADDING_SIDE * 2);

        const LAYOUT_Y_START = PADDING_TOP + 256; // Start entries after header
        const LAYOUT_Y_STEP = 155;      
        const TITLE_Y_OFFSET = -6;      
        const INFO_X_START = 460;

        function getHeaderData(dates) {
            if (dates.length === 0) return { range: "ADD RUNS", year: "2026" };
            const d = new Date(dates[0]);
            const diff = d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1); 
            const mon = new Date(new Date(d).setDate(diff));
            const sun = new Date(new Date(mon).setDate(mon.getDate() + 6));
            const m1 = mon.toLocaleDateString('en-GB', { month: 'long' }).toUpperCase();
            const m2 = sun.toLocaleDateString('en-GB', { month: 'long' }).toUpperCase();
            let range = mon.getMonth() === sun.getMonth() ? `${m1} ${mon.getDate()} - ${sun.getDate()}` : `${m1} ${mon.getDate()} - ${m2} ${sun.getDate()}`;
            return { range, year: mon.getFullYear() };
        }

        function createEntry(type, savedData = null) {
            if (document.querySelectorAll('.entry-card').length >= MAX_ENTRIES) return;
            const div = document.createElement('div');
            div.className = 'entry-card';
            div.dataset.logo = savedData?.logo || "";
            const isSpecial = type === 'special';
            const defaultAlt = savedData ? savedData.isAlt : (isSpecial ? true : false);
            const selectedDists = savedData?.dists || (isSpecial ? [] : ["5", "10"]);

            div.innerHTML = `
                <button class="remove-entry-btn" onclick="this.parentElement.remove();">×</button>
                <div class="grid-inputs">
                    <input type="date" class="date-in" value="${savedData?.date || new Date().toISOString().split('T')[0]}">
                    <input type="text" class="time-in" placeholder="TIME" value="${savedData?.time || (isSpecial ? '' : '19:00')}">
                    <div class="ui-blob full-width">
                        ${DIST_OPTIONS.map(opt => `<label class="dist-chip"><input type="checkbox" value="${opt}" ${selectedDists.includes(opt) ? 'checked' : ''}><span>${opt}</span></label>`).join('')}
                        <input type="text" class="custom-dist-in" placeholder="+" value="${savedData?.customDist || ''}">
                    </div>
                    <div class="full-width" style="display:flex; gap:10px;">
                        <select class="pace-in" style="flex:1;">
                            <option value="" ${isSpecial ? 'selected' : ''}>NO PACE</option>
                            <option value=">6:30" ${savedData?.pace === '>6:30' || (!savedData && !isSpecial) ? 'selected' : ''}>>6:30 PACE</option>
                            <option value="<6:00" ${savedData?.pace === '<6:00' ? 'selected' : ''}><6:00 PACE</option>
                        </select>
                        <input type="text" class="custom-pace-in" placeholder="CUSTOM" style="flex:1;" value="${savedData?.customPace || ''}">
                    </div>
                    <input type="text" class="comm-in full-width" placeholder="TITLE" value="${savedData?.title || (isSpecial ? '' : 'NARC')}">
                    <input type="text" class="loc-in full-width" placeholder="LOCATION" value="${savedData?.loc || (isSpecial ? '' : 'Kafee VanGogh - Hasselt')}">
                    <div class="ui-blob full-width logo-controls-blob">
                        <select class="logo-preset-sel"><option value="">-- LOGO --</option>${PRESET_LOGOS.map(l => `<option value="${l.path}">${l.name}</option>`).join('')}</select>
                        <input type="file" class="logo-file" accept="image/*">
                    </div>
                    <label class="alt-color-wrap full-width"><input type="checkbox" class="is-alt" ${defaultAlt ? 'checked' : ''}> ALT COLOR</label>
                </div>`;
            entriesDiv.appendChild(div);

            const sel = div.querySelector('.logo-preset-sel');
            const fileIn = div.querySelector('.logo-file');
            sel.onchange = (e) => div.dataset.logo = e.target.value;
            fileIn.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => { div.dataset.logo = ev.target.result; sel.value = ""; };
                if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
            };
        }

        async function updatePreview() {
            const cards = Array.from(document.querySelectorAll('.entry-card'));
            const data = cards.map(c => {
                const dList = Array.from(c.querySelectorAll('.ui-blob input:checked')).map(cb => cb.value);
                const customD = c.querySelector('.custom-dist-in').value;
                if(customD) dList.push(customD);
                return {
                    date: new Date(c.querySelector('.date-in').value),
                    time: c.querySelector('.time-in').value,
                    distStr: dList.join(" / "),
                    pace: c.querySelector('.custom-pace-in').value || c.querySelector('.pace-in').value,
                    title: c.querySelector('.comm-in').value.toUpperCase(),
                    loc: c.querySelector('.loc-in').value.toUpperCase(),
                    logo: c.dataset.logo,
                    isAlt: c.querySelector('.is-alt').checked
                };
            }).sort((a,b) => a.date - b.date);

            // Canvas Base
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,1080,1920);
            if(bgImg.complete) {
                const s = Math.max(1080/bgImg.width, 1920/bgImg.height);
                ctx.drawImage(bgImg, 540-(bgImg.width*s)/2, 960-(bgImg.height*s)/2, bgImg.width*s, bgImg.height*s);
                ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,1080,1920);
            }

            // --- HEADER (Inside Safe Top) ---
            if(mainLogo.complete) {
                const h=85, w=(mainLogo.width/mainLogo.height)*h;
                ctx.drawImage(mainLogo, 540-w/2, PADDING_TOP, w, h);
            }

            const dates = Array.from(document.querySelectorAll('.date-in')).map(i => i.value).filter(v => v);
            const head = getHeaderData(dates);
            document.getElementById('smart-header-display').innerText = `${head.range}  |  ${head.year}`;
            ctx.fillStyle = 'white'; ctx.font = '26px "Integral CF"'; 
            ctx.textAlign = 'left'; ctx.fillText(head.range, PADDING_SIDE, PADDING_TOP + 140);
            ctx.textAlign = 'right'; ctx.fillText(head.year, 1080 - PADDING_SIDE, PADDING_TOP + 140);

            // --- ENTRIES ---
            for(let i=0; i<data.length; i++) {
                const r = data[i], y = LAYOUT_Y_START + (i * LAYOUT_Y_STEP);
                const colorMain = r.isAlt ? '#ffd98d' : 'white';
                const colorSub = '#a1a1a6';

                ctx.textAlign = 'left'; ctx.fillStyle = colorMain; ctx.font = '64px "Integral CF"';
                ctx.fillText(String(r.date.getDate()).padStart(2,'0'), PADDING_SIDE, y);
                ctx.font = 'bold 18px "Integral CF"'; ctx.fillText(r.date.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase(), PADDING_SIDE + 110, y - 32);
                ctx.fillStyle = colorSub; ctx.font = '18px Helvetica'; ctx.fillText(r.time, PADDING_SIDE + 110, y);

                ctx.textAlign = 'left'; ctx.fillStyle = colorMain;
                ctx.font = 'bold 20px "Integral CF"'; 
                if(r.distStr) ctx.fillText(`📏 ${r.distStr}`, PADDING_SIDE + 250, y - 32);
                ctx.fillStyle = colorSub; ctx.font = '18px Helvetica'; 
                if(r.pace) ctx.fillText(`🏃‍♀️ ${r.pace}`, PADDING_SIDE + 250, y);

                ctx.textAlign = 'left'; ctx.fillStyle = colorMain;
                ctx.font = 'italic 34px "Integral CF"'; ctx.fillText(r.title, INFO_X_START, (y - 18) + TITLE_Y_OFFSET, r.logo ? 340 : 500);
                ctx.fillStyle = colorSub; ctx.font = '17px Helvetica'; ctx.fillText(r.loc, INFO_X_START, y, r.logo ? 340 : 500);

                if(r.logo) {
                    const img = new Image(); img.src = r.logo;
                    if(img.complete) {
                        const h=70, w=h*(img.width/img.height); 
                        ctx.drawImage(img, (1080 - PADDING_SIDE) - w, y-60, w, h);
                    }
                }
            }
            
            // --- FOOTER (Inside Safe Bottom) ---
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '18px "Integral CF"'; ctx.textAlign='center';
            ctx.fillText(document.getElementById('footer-in').value, 540, 1920 - PADDING_BOTTOM);
            
            const out = canvas.toDataURL('image/png');
            document.getElementById('preview').src = out;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('download-link').href = out;
            document.getElementById('download-link').style.display = 'block';
        }

        createEntry('weekly');
        document.getElementById('add-weekly').onclick = () => createEntry('weekly');
        document.getElementById('add-special').onclick = () => createEntry('special');
        setInterval(updatePreview, 300);
    </script>
</body>
</html>
